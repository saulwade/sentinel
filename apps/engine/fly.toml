# Fly.io app config for the Sentinel engine.
# Run from the repo root: `flyctl deploy --config apps/engine/fly.toml`
#
# Before first deploy:
#   flyctl launch --no-deploy --config apps/engine/fly.toml --copy-config
#   flyctl volumes create sentinel_data --size 1 --region <your-region>
#   flyctl secrets set ANTHROPIC_API_KEY=sk-ant-... ADMIN_TOKEN=<random> \
#                      ALLOWED_ORIGINS=https://<your-vercel-url>

app = "sentinel-engine"            # change if you pick a different name
primary_region = "dfw"             # Dallas — close to Vercel edge. Swap to mia/sjc/lax if preferred.

[build]
  dockerfile = "apps/engine/Dockerfile"

[env]
  PORT = "3001"
  DB_PATH = "/data/sentinel.db"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "suspend"   # save credits when idle — first request wakes it
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[mounts]]
  source = "sentinel_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"                 # SQLite + Node 22 fits comfortably
  cpus = 1
